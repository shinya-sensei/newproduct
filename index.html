<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --primary-color: #007bff; --bg-color: #f0f2f5; }
    body { background-color: var(--bg-color); padding: 10px; font-family: sans-serif; }
    .container-fluid { max-width: 700px; margin: 0 auto; }
    .search-container { position: sticky; top: 0; background: var(--bg-color); z-index: 1000; padding-bottom: 8px; }
    .card { border: none; border-radius: 8px; margin-bottom: 5px; border-left: 4px solid var(--primary-color); }
    .card-body { padding: 8px 12px !important; }
    .card.checked { background-color: #e9ecef !important; color: #777; border-left: 4px solid #6c757d; opacity: 0.7; }
    .btn-checkin { border-radius: 6px; font-weight: bold; padding: 6px 0; min-width: 75px; font-size: 0.85rem; }
    .info-header { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
    .company-text { font-size: 0.75rem; color: #666; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .staff-badge { font-size: 0.65rem; background: #e7f1ff; color: var(--primary-color); padding: 1px 5px; border-radius: 4px; white-space: nowrap; }
    .name-text { font-size: 1.05rem; font-weight: bold; }
    .party-tag { background-color: #fff3cd; color: #856404; padding: 1px 6px; border-radius: 4px; font-size: 0.7rem; border: 1px solid #ffeeba; display: inline-block; margin-top: 3px; }
    #counterArea { font-size: 0.8rem; color: #555; background: #fff; padding: 2px 15px; border-radius: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    #statusMsg { font-size: 0.85rem; height: 1.2em; color: #28a745; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container-fluid text-center">
    <div class="search-container">
      <h6 class="mb-1 text-secondary" style="font-size: 0.85rem;">受付 v2.0 API</h6>
      <div id="counterArea" class="mb-2">接続中...</div>
      <input type="text" id="searchInput" class="form-control form-control-sm shadow-sm" style="padding: 10px;" placeholder="カナ・漢字で検索" oninput="filterCards()" disabled>
      <div id="statusMsg" class="mt-1"></div>
    </div>
    <div id="cardContainer" class="row g-1 text-start">
      <p class="text-center text-muted mt-5" id="loadingText">データを読み込んでいます...</p>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzlxtcT3HN9nadOci4U4Si-f_PrgGoYQiKjuCrm_WmF_dqWpjwNNNQqN29MfRhZrCEj4Q/exec";
    let allData = [];

    async function callGas(action, params = {}) {
      const response = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action, ...params })
      });
      return await response.json();
    }

    window.onload = async () => {
      try {
        allData = await callGas('getData');
        updateCounter();
        document.getElementById('loadingText').style.display = "none";
        const input = document.getElementById('searchInput');
        input.disabled = false;
        input.focus();
      } catch (e) {
        document.getElementById('loadingText').innerText = "エラー: GASの設定（全員に公開）を確認してください";
      }
    };

    function updateCounter(manualCount = null) {
      const total = allData.length;
      const current = manualCount !== null ? manualCount : allData.filter(item => item.checked).length;
      document.getElementById('counterArea').innerText = `受付状況：${current} / ${total}`;
    }

    function toKatakana(str) {
      if (!str) return "";
      return String(str).replace(/\s+/g, "").replace(/[ぁ-ん]/g, (s) => String.fromCharCode(s.charCodeAt(0) + 0x60));
    }

    function filterCards() {
      const input = document.getElementById('searchInput').value.trim();
      const container = document.getElementById('cardContainer');
      if (input === "") { container.innerHTML = ""; return; }
      const target = toKatakana(input).toLowerCase();
      const filtered = allData.filter(item => toKatakana(item.name).toLowerCase().includes(target) || toKatakana(item.kana).toLowerCase().includes(target));
      renderCards(filtered);
    }

    function renderCards(data) {
      const container = document.getElementById('cardContainer');
      container.innerHTML = data.map(item => `
        <div class="col-12">
          <div class="card shadow-sm ${item.checked ? 'checked' : ''}">
            <div class="card-body d-flex justify-content-between align-items-center">
              <div style="flex: 1; min-width: 0;">
                <div class="info-header">
                  <span class="company-text">${item.company || '---'}</span>
                  <span class="staff-badge">担当: ${item.staff || '未'}</span>
                </div>
                <div class="name-text">${item.name} 様</div>
                ${item.party ? `<div><span class="party-tag">懇親会: ${item.party}</span></div>` : ''}
              </div>
              <div id="btn-area-${item.rowNum}">
                ${item.checked ? '<button class="btn btn-secondary btn-checkin" disabled>完了</button>' : `<button class="btn btn-primary btn-checkin" onclick="confirmCheckIn(${item.rowNum}, '${item.name}')">受付</button>`}
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function confirmCheckIn(rowNum, name) {
      const btn = document.querySelector(`#btn-area-${rowNum} button`);
      if (btn.innerText === "受付") {
        btn.innerText = "確定？";
        btn.classList.replace('btn-primary', 'btn-danger');
        setTimeout(() => { if (btn.innerText === "確定？") { btn.innerText = "受付"; btn.classList.replace('btn-danger', 'btn-primary'); } }, 2000);
      } else {
        executeCheckIn(rowNum, btn, name);
      }
    }

    async function executeCheckIn(rowNum, btn, name) {
      const target = allData.find(d => d.rowNum === rowNum);
      if(target) target.checked = true;
      updateCounter();
      document.getElementById('statusMsg').innerText = `✅ ${name} 様`;
      btn.innerText = "...";
      btn.disabled = true;

      const latestCount = await callGas('recordCheckIn', { rowNum });
      updateCounter(latestCount);
      btn.parentElement.innerHTML = '<button class="btn btn-secondary btn-checkin" disabled>完了</button>';
      document.getElementById(`btn-area-${rowNum}`).closest('.card').classList.add('checked');
      setTimeout(() => { document.getElementById('statusMsg').innerText = ""; }, 1500);
    }
  </script>
</body>
</html>
